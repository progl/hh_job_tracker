{% extends "base.html" %}
{% block title %}Профиль{% endblock %}
{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-lg font-semibold">Мой профиль</h2>
  <a href="/" class="text-sm text-blue-600 hover:underline">← к списку</a>
</div>

<div class="grid grid-cols-1 lg:grid-cols-2 gap-4">
  <div class="bg-white border border-neutral-200 rounded-lg p-4">
    <div class="text-xs uppercase tracking-wide text-neutral-500 mb-2">Из HH</div>
    <dl class="grid grid-cols-2 gap-y-1.5 text-sm">
      <dt class="text-neutral-500">HHID</dt><dd class="font-mono">{{ p.hhid or '—' }}</dd>
      <dt class="text-neutral-500">Имя</dt><dd>{{ p.full_name or '—' }}</dd>
      <dt class="text-neutral-500">Резюме ID</dt><dd class="font-mono">{{ p.resume_id or '—' }}</dd>
      <dt class="text-neutral-500">Обновлено</dt><dd class="text-neutral-500">{{ p.updated_at or '—' }}</dd>
    </dl>
    <form hx-post="/api/collect/personal" hx-target="#refresh-result" hx-swap="innerHTML" class="mt-3">
      <button class="px-3 py-1.5 text-sm rounded bg-violet-700 text-white hover:bg-violet-600">Обновить из HH</button>
      <span id="refresh-result" class="ml-2 text-sm text-emerald-700"></span>
    </form>
  </div>

  <form hx-post="/api/profile" hx-target="#save-result" hx-swap="innerHTML" class="bg-white border border-neutral-200 rounded-lg p-4 space-y-3">
    <div class="text-xs uppercase tracking-wide text-neutral-500 mb-1">Параметры для match-score</div>

    <div>
      <label class="block text-xs text-neutral-500 mb-1">Должность</label>
      <input name="title" value="{{ p.title or '' }}" class="w-full border border-neutral-300 rounded px-2 py-1.5 text-sm">
    </div>
    <div class="grid grid-cols-2 gap-3">
      <div>
        <label class="block text-xs text-neutral-500 mb-1">Опыт, лет</label>
        <input name="years_experience" type="number" step="0.5" value="{{ p.years_experience or '' }}" class="w-full border border-neutral-300 rounded px-2 py-1.5 text-sm">
      </div>
      <div>
        <label class="block text-xs text-neutral-500 mb-1">Ожидание ЗП от</label>
        <div class="flex gap-2">
          <input name="salary_expected_from" type="number" step="10000" value="{{ p.salary_expected_from or '' }}" class="grow border border-neutral-300 rounded px-2 py-1.5 text-sm">
          <input name="salary_currency" value="{{ p.salary_currency or 'RUR' }}" class="w-20 border border-neutral-300 rounded px-2 py-1.5 text-sm">
        </div>
      </div>
    </div>
    <div>
      <label class="block text-xs text-neutral-500 mb-1">Навыки (через запятую)</label>
      <textarea name="skills_csv" rows="3" class="w-full border border-neutral-300 rounded px-2 py-1.5 text-sm font-mono">{{ p.skills | join(', ') }}</textarea>
    </div>
    <div>
      <label class="block text-xs text-neutral-500 mb-1">Форматы (через запятую: REMOTE, HYBRID, OFFICE)</label>
      <input name="formats_csv" value="{{ p.formats | join(', ') }}" class="w-full border border-neutral-300 rounded px-2 py-1.5 text-sm">
    </div>
    <div class="flex items-center gap-3">
      <button class="px-3 py-1.5 text-sm rounded bg-neutral-900 text-white hover:bg-neutral-700">Сохранить</button>
      <span id="save-result" class="text-sm text-emerald-700"></span>
    </div>
  </form>
</div>
{% endblock %}
