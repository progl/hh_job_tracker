<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}HH Job Tracker{% endblock %}</title>
  <script>
    // theme bootstrap до загрузки tailwind
    (function() {
      try {
        const t = localStorage.getItem('theme');
        if (t === 'dark' || (!t && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
          document.documentElement.classList.add('dark');
        }
      } catch(e) {}
    })();
  </script>
  <script>tailwind = { config: { darkMode: 'class' } }</script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { darkMode: 'class' };</script>
  <script src="https://unpkg.com/htmx.org@2.0.4"></script>
  <style>
    .htmx-indicator { display: none; }
    .htmx-request .htmx-indicator { display: inline; }
    .htmx-request.htmx-indicator { display: inline; }
    table.compact td, table.compact th { padding: 6px 10px; font-size: 13px; }
    .dark body { background: #0a0a0a; color: #e5e5e5; }
    .dark .bg-white { background-color: #171717; }
    .dark .bg-neutral-50 { background-color: #0a0a0a; }
    .dark .border-neutral-200, .dark .border-neutral-100 { border-color: #262626; }
    .dark .text-neutral-900 { color: #f5f5f5; }
    .dark .text-neutral-800 { color: #e5e5e5; }
    .dark .text-neutral-700, .dark .text-neutral-600 { color: #d4d4d4; }
    .dark .text-neutral-500 { color: #a3a3a3; }
    .dark .text-neutral-400 { color: #737373; }
    .dark input, .dark textarea { background-color: #262626; color: #f5f5f5; border-color: #404040; }
    .dark select { background-color: #262626; color: #f5f5f5; border-color: #404040; }
    .dark thead.sticky-h th, .dark thead { background-color: #171717 !important; }
    .dark tbody tr:hover { background-color: #262626 !important; }
    .dark .hover\:bg-neutral-50:hover, .dark .hover\:bg-neutral-100:hover { background-color: #262626 !important; }
    .dark .bg-neutral-100 { background-color: #262626; color: #d4d4d4; }
    .dark .bg-blue-100 { background-color: #1e3a5f; color: #93c5fd; }
    .dark .bg-emerald-100 { background-color: #14532d; color: #6ee7b7; }
    .dark .bg-violet-100 { background-color: #4c1d95; color: #c4b5fd; }
    .dark .bg-amber-100 { background-color: #78350f; color: #fcd34d; }
    .dark .bg-red-100 { background-color: #7f1d1d; color: #fca5a5; }
    .dark .bg-emerald-50 { background-color: #064e3b; color: #6ee7b7; }
    .dark .bg-neutral-900 { background-color: #171717; }
    .dark a { color: inherit; }
    .dark a.text-blue-600 { color: #60a5fa; }
    /* Подсветка строки, на которую возвращаешься после клика по внешней ссылке */
    tr.seen-external > td { background-color: rgb(254 243 199 / 0.5) !important; }
    .dark tr.seen-external > td { background-color: rgb(120 53 15 / 0.35) !important; }
    @keyframes seenShake {
      0%,100% { transform: translateX(0); }
      15% { transform: translateX(-6px); }
      30% { transform: translateX(5px); }
      45% { transform: translateX(-4px); }
      60% { transform: translateX(3px); }
      75% { transform: translateX(-2px); }
    }
    tr.seen-external-shake { animation: seenShake 450ms ease-in-out 1; }
    /* Полоска авто-скрытия завершённой задачи (готово/cancelled) */
    .auto-hide-bar {
      height: 2px;
      width: 100%;
      background: linear-gradient(to right, #10b981, #6ee7b7);
      border-radius: 1px;
      transition: width var(--auto-hide-ms, 5000ms) linear;
    }
    .auto-hide-bar.cancelled { background: linear-gradient(to right, #737373, #a3a3a3); }
  </style>
</head>
<body class="bg-neutral-50 dark:bg-neutral-950 text-neutral-900 dark:text-neutral-100">
  <header class="bg-white dark:bg-neutral-900 border-b border-neutral-200 dark:border-neutral-800">
    <div class="max-w-[1600px] mx-auto px-4 py-3 flex items-center justify-between">
      <div class="flex items-center gap-6">
        <h1 class="text-base font-semibold">HH Job Tracker</h1>
        <nav class="text-sm space-x-4 text-neutral-600 dark:text-neutral-400">
          <a href="/" class="hover:text-neutral-900 dark:hover:text-white">Список</a>
          <a href="/search" class="hover:text-neutral-900 dark:hover:text-white">🧲 Поиск</a>
          <a href="/funnel" class="hover:text-neutral-900 dark:hover:text-white">Воронка</a>
          <a href="/profile" class="hover:text-neutral-900 dark:hover:text-white">Профиль</a>
          <a href="/logs" class="hover:text-neutral-900 dark:hover:text-white">Логи</a>
          <a href="/jobs" class="hover:text-neutral-900 dark:hover:text-white">⚙️ Джобы</a>
          <a href="/llm-logs" class="hover:text-neutral-900 dark:hover:text-white">✨ LLM</a>
          <a href="/analytics" class="hover:text-neutral-900 dark:hover:text-white">📊 Аналитика</a>
          <a href="/api/health" class="hover:text-neutral-900 dark:hover:text-white" target="_blank">Статус</a>
        </nav>
      </div>
      <div class="flex items-center gap-3">
        {% block headerright %}{% endblock %}
        <button onclick="window.toggleTheme()" title="Переключить тему"
                class="text-sm w-8 h-8 rounded-full border border-neutral-300 dark:border-neutral-700 hover:bg-neutral-100 dark:hover:bg-neutral-800">
          <span class="dark:hidden">☾</span><span class="hidden dark:inline">☀</span>
        </button>
      </div>
    </div>
  </header>
  <main class="max-w-[1600px] mx-auto px-4 py-5">
    {% block content %}{% endblock %}
  </main>

  <!-- Status panel -->
  <div id="status-panel" class="fixed bottom-3 right-3 z-40 w-[360px] max-h-[70vh] flex flex-col rounded-lg border border-neutral-300 dark:border-neutral-700 bg-white dark:bg-neutral-900 shadow-lg overflow-hidden text-[12.5px]" style="display:none">
    <div class="bg-neutral-50 dark:bg-neutral-800 border-b border-neutral-200 dark:border-neutral-700 cursor-pointer select-none" onclick="window.statusToggle()">
      <div class="px-3 py-2 flex items-center justify-between">
        <div class="flex items-center gap-2">
          <span id="status-dot" class="inline-block w-2 h-2 rounded-full bg-emerald-500"></span>
          <span class="font-medium">Статус</span>
          <span id="status-summary" class="text-neutral-500 truncate max-w-[230px]"></span>
        </div>
        <span class="text-neutral-400" id="status-arrow">▸</span>
      </div>
      <!-- мини-прогресс активной задачи: виден даже когда панель свёрнута -->
      <div id="status-minibar" class="h-0.5 bg-blue-100 dark:bg-blue-900/40" style="display:none">
        <div id="status-minibar-fill" class="h-full bg-blue-500" style="width:0%"></div>
      </div>
    </div>
    <div id="status-body" class="overflow-y-auto p-3 space-y-3" style="display:none">
      <div>
        <div class="text-[10px] uppercase tracking-wide text-neutral-500 mb-1">Активные задачи</div>
        <div id="tasks-info" class="space-y-2"></div>
      </div>
      <div>
        <div id="client-info" class="text-neutral-700 dark:text-neutral-200"></div>
      </div>
      <div>
        <button type="button" onclick="window.schedToggle(event)"
                class="text-[10px] uppercase tracking-wide text-neutral-500 mb-1 flex items-center gap-1 hover:text-neutral-700 dark:hover:text-neutral-300">
          <span id="sched-arrow">▸</span> Расписание <span class="normal-case text-neutral-400">(полностью — на /jobs)</span>
        </button>
        <div id="scheduler-info" class="space-y-1 text-neutral-700 dark:text-neutral-200" style="display:none"></div>
      </div>
    </div>
  </div>

  <!-- Toasts -->
  <div id="toasts" class="fixed top-16 right-3 z-50 space-y-2"></div>

  <script>
    window._statusUserState = null;  // 'open' | 'closed' — явный выбор пользователя (перебивает авто)
    window.setStatusOpen = (open, byUser) => {
      const b = document.getElementById('status-body');
      const a = document.getElementById('status-arrow');
      if (!b) return;
      b.style.display = open ? 'block' : 'none';
      a.textContent = open ? '▾' : '▸';
      if (byUser) {
        window._statusUserState = open ? 'open' : 'closed';
        try { localStorage.setItem('statusCollapsed', open ? '0' : '1'); } catch(e){}
      }
    };
    window.statusToggle = () => {
      const open = document.getElementById('status-body').style.display === 'none';
      window.setStatusOpen(open, true);
    };
    window.schedToggle = (ev) => {
      if (ev) ev.stopPropagation();
      const s = document.getElementById('scheduler-info');
      const a = document.getElementById('sched-arrow');
      const open = s.style.display === 'none';
      s.style.display = open ? 'block' : 'none';
      if (a) a.textContent = open ? '▾' : '▸';
    };
    (function() {
      // По умолчанию панель свёрнута (компактная пилюля). Открываем только если
      // пользователь раньше держал её открытой.
      try {
        if (localStorage.getItem('statusCollapsed') === '0') {
          window._statusUserState = 'open';
          window.setStatusOpen(true, false);
        }
      } catch(e){}
    })();

    window.runAction = async (event, url, label, extraParams) => {
      if (event && event.preventDefault) event.preventDefault();
      const form = event && event.target;
      let body = new URLSearchParams();
      if (form && form.tagName === 'FORM') {
        new FormData(form).forEach((v, k) => body.append(k, v));
      }
      if (extraParams) Object.entries(extraParams).forEach(([k,v]) => body.append(k, v));
      window.showToast('info', `▶ ${label}: запускаю…`);
      try {
        const r = await fetch(url, {method: 'POST', body});
        const d = await r.json();
        if (d.ok) window.showToast('ok', `▶ ${label}: задача поставлена`);
        else if (d.reason === 'already_running') window.showToast('info', `${label}: уже запущена`);
        else if (d.reason === 'client_paused') window.showToast('err', `${label}: ${d.message || 'клиент на паузе'}`);
        else window.showToast('err', `${label}: ${d.reason || 'ошибка'}`);
      } catch(e) {
        window.showToast('err', `${label}: ${e.message}`);
      }
    };

    window.runJobNow = async (jobId, label) => {
      window.showToast('info', `▶ ${label}: запускаю…`);
      try {
        const r = await fetch(`/api/scheduler/${jobId}/run-now`, {method: 'POST'});
        const d = await r.json();
        if (d.ok) {
          window.showToast('ok', `▶ ${label}: запущено`);
        } else if (d.reason === 'client_paused') {
          window.showToast('err', `${label}: ${d.message || 'клиент HH на паузе'}`);
        } else if (d.reason === 'already_running') {
          window.showToast('info', `${label}: уже запущена`);
        } else {
          window.showToast('err', `${label}: ${d.reason || 'ошибка'}`);
        }
      } catch(e) {
        window.showToast('err', `${label}: ${e.message}`);
      }
    };

    window.showToast = (kind, text) => {
      const cls = {ok: 'bg-emerald-600', err: 'bg-red-600', info: 'bg-neutral-800'}[kind] || 'bg-neutral-800';
      const el = document.createElement('div');
      el.className = `${cls} text-white px-3 py-2 rounded-lg shadow-lg text-sm max-w-[360px]`;
      el.textContent = text;
      document.getElementById('toasts').appendChild(el);
      setTimeout(() => el.remove(), 5000);
    };

    window.fmtRelative = (ts) => {
      if (!ts) return '—';
      const dt = new Date(ts.replace(' ', 'T'));
      const diff = (Date.now() - dt.getTime()) / 1000;
      if (Math.abs(diff) < 60) return `${Math.round(-diff)}с`;
      if (Math.abs(diff) < 3600) return `${Math.round(-diff/60)}м`;
      if (Math.abs(diff) < 86400) return `${Math.round(-diff/3600)}ч`;
      return dt.toLocaleString('ru-RU');
    };

    window.renderClient = (c) => {
      if (!c) return;
      const paused = c.paused_now;
      const dot = document.getElementById('status-dot');
      dot.className = `inline-block w-2 h-2 rounded-full ${paused ? 'bg-red-500 animate-pulse' : 'bg-emerald-500'}`;
      document.getElementById('client-info').innerHTML = `
        <div class="flex items-center gap-2 flex-wrap">
          <span>Состояние: <b class="${paused ? 'text-red-600' : 'text-emerald-600'}">${paused ? 'на паузе (anti-bot)' : 'активен'}</b></span>
          ${paused ? `<button onclick="window.unpauseClient()" class="text-[11px] px-2 py-0.5 rounded border border-red-300 text-red-700 hover:bg-red-50 dark:hover:bg-red-900/30" title="Снять anti-bot паузу немедленно. Используй осторожно — может снова получить 403.">✕ снять паузу</button>` : ''}
        </div>
        <div class="text-neutral-500 text-[11px]">cookies: ${c.cookie_count} · challenges: ${c.challenge_count} · ${c.base_url}</div>
      `;
    };
    window.unpauseClient = async () => {
      if (!confirm('Снять anti-bot паузу? Следующий запрос может опять получить 403 и поставить новую паузу.')) return;
      const r = await fetch('/api/client/unpause', {method: 'POST'});
      const d = await r.json();
      window.showToast(d.ok ? 'ok' : 'err', d.ok ? '✓ Пауза снята' : 'Ошибка');
    };
    window.renderScheduler = (s) => {
      if (!s || !s.jobs) return;
      const labels = {
        personal_refresh: 'Обновлять отклики (инкрем.)',
        personal_full_refresh: 'Полный sync откликов',
        fx_refresh: 'Курсы ЦБ',
        ml_retrain: 'Обучение ML',
        backfill_pending: 'Дотягивать вакансии',
        sync_searches: 'Синк сохранённых поисков',
        dedup_vacancies: 'Дедуп вакансий',
        llm_parse_requirements: 'LLM: разбор требований',
        cover_letter_generate: 'LLM: сопроводительные письма',
        embed_vacancies: 'RAG: индексация вакансий',
        backfill_descriptions: 'Дотянуть описания вакансий',
        daily_digest: 'Ежедневный дайджест',
      };
      document.getElementById('scheduler-info').innerHTML = s.jobs.map(j => {
        const label = labels[j.id] || j.id;
        const next = j.next_run ? window.fmtRelative(j.next_run.slice(0,19).replace(' ','T')) : '—';
        const last = j.last_result ? `<span class="text-[11px] text-neutral-500">· последний: ${JSON.stringify(j.last_result).slice(0,70)}</span>` : '';
        return `<div class="flex justify-between gap-2 items-center">
          <div class="flex items-center gap-2">
            <button title="Запустить сейчас" onclick="window.runJobNow('${j.id}','${label}')"
                    class="text-[11px] px-1.5 py-0.5 rounded border border-neutral-300 dark:border-neutral-600 hover:bg-neutral-100 dark:hover:bg-neutral-700">▶</button>
            <div>${label}</div>
          </div>
          <div class="text-neutral-500 text-[11px]">через ${next}</div>
        </div>${last ? '<div>'+last+'</div>' : ''}`;
      }).join('');
    };
    window.renderTask = (t) => {
      const colors = { running: 'bg-blue-500', done: 'bg-emerald-500', error: 'bg-red-500', cancelled: 'bg-neutral-500', queued: 'bg-amber-500' };
      const pct = t.progress || 0;
      const isFinal = t.status === 'done' || t.status === 'error' || t.status === 'cancelled';
      const willAutoHide = t.status === 'done' || t.status === 'cancelled';  // error НЕ скрываем
      const closeBtn = isFinal
        ? `<button class="text-neutral-400 hover:text-red-600 text-[14px] leading-none px-1" title="Скрыть из панели" onclick="window.hideTask('${t.id}')">×</button>`
        : '';
      const autoHideBar = willAutoHide
        ? `<div class="mt-1.5 h-0.5 bg-neutral-100 dark:bg-neutral-800 rounded overflow-hidden"
              title="Авто-скрытие через ${Math.round(window.AUTO_HIDE_MS/1000)}с — полная история на /jobs">
             <div class="auto-hide-bar ${t.status === 'cancelled' ? 'cancelled' : ''}"
                  data-pending="1"
                  style="--auto-hide-ms: ${window.AUTO_HIDE_MS}ms"></div>
           </div>`
        : '';
      return `<div data-tid="${t.id}" class="border border-neutral-200 dark:border-neutral-700 rounded p-2">
        <div class="flex items-center justify-between gap-2">
          <div class="font-medium truncate">${t.label}</div>
          <div class="flex items-center gap-1">
            <div class="text-[11px] text-neutral-500">${t.status}</div>
            ${closeBtn}
          </div>
        </div>
        <div class="mt-1 h-1.5 rounded bg-neutral-200 dark:bg-neutral-700 overflow-hidden">
          <div class="h-full ${colors[t.status] || 'bg-neutral-400'}" style="width:${pct}%"></div>
        </div>
        <div class="mt-1 flex justify-between text-[11px] text-neutral-500">
          <div class="truncate">${t.message || ''}</div>
          <div>${t.total ? t.current + '/' + t.total : ''}</div>
        </div>
        ${t.status === 'running' ? `<button class="mt-1 text-[11px] text-red-600 hover:underline" onclick="fetch('/api/tasks/${t.kind}/cancel', {method:'POST'})">отменить</button>` : ''}
        ${autoHideBar}
      </div>`;
    };
    window.tasksState = {};
    window.hiddenTasks = new Set();
    window.hideTask = (id) => {
      window.hiddenTasks.add(id);
      window.renderTasks();
    };
    window.renderTasks = () => {
      const all = Object.values(window.tasksState)
        .filter(t => !window.hiddenTasks.has(t.id))
        .sort((a,b)=>((b.started_at||0)-(a.started_at||0)));
      const active = all.filter(t => t.status === 'running' || t.status === 'queued');
      const recent = all.filter(t => t.status !== 'running' && t.status !== 'queued').slice(0,3);
      const html = active.concat(recent).map(window.renderTask).join('');
      document.getElementById('tasks-info').innerHTML = html || '<div class="text-neutral-500 text-[11px]">нет активных задач</div>';
      // Краткая сводка в шапке: что именно идёт + прогресс (видно даже свёрнутым)
      const first = active[0];
      const sum = active.length
        ? `${active.length>1 ? active.length+' · ' : ''}${(first.label||'').slice(0,28)}${first.total ? ' '+(first.progress||0)+'%' : '…'}`
        : '';
      document.getElementById('status-summary').textContent = sum;
      // мини-полоска прогресса в шапке
      const mb = document.getElementById('status-minibar');
      const fill = document.getElementById('status-minibar-fill');
      if (mb && fill) {
        if (active.length) { mb.style.display = 'block'; fill.style.width = (first.progress||0) + '%'; }
        else { mb.style.display = 'none'; }
      }
      // пульсация точки когда что-то идёт
      const dot = document.getElementById('status-dot');
      if (dot && !document.getElementById('client-info').textContent.includes('паузе')) {
        dot.className = `inline-block w-2 h-2 rounded-full ${active.length ? 'bg-blue-500 animate-pulse' : 'bg-emerald-500'}`;
      }
      // авто-раскрытие пока идут задачи (если пользователь не закрыл вручную); авто-сворачивание после
      if (active.length && window._statusUserState !== 'closed') {
        window.setStatusOpen(true, false); window._statusAutoOpened = true;
      } else if (!active.length && window._statusAutoOpened && window._statusUserState !== 'open') {
        window.setStatusOpen(false, false); window._statusAutoOpened = false;
      }
      window.animateAutoHideBars();
    };
    window.TABLE_REFRESH_KINDS = new Set([
      'sync_searches', 'backfill_pending', 'dedup_vacancies',
      'personal_refresh', 'personal_full_refresh',
    ]);
    window.maybeRefreshTable = (kind) => {
      if (!window.TABLE_REFRESH_KINDS.has(kind)) return;
      const form = document.getElementById('filters');
      if (!form || typeof htmx === 'undefined') return;
      htmx.trigger(form, 'refresh');
    };
    window.AUTO_HIDE_MS = 5000;  // done/cancelled — скрываем через 5с (полная история всё равно на /jobs)
    window._autoHideTimers = {};
    window.scheduleAutoHide = (taskId, status) => {
      // ошибки оставляем висеть — пользователь должен заметить и сам закрыть крестиком
      if (status === 'error') return;
      if (status !== 'done' && status !== 'cancelled') return;
      // сбросим предыдущий таймер для этого id (если был — на reuse id)
      if (window._autoHideTimers[taskId]) clearTimeout(window._autoHideTimers[taskId]);
      window._autoHideTimers[taskId] = setTimeout(() => {
        window.hideTask(taskId);
        delete window._autoHideTimers[taskId];
      }, window.AUTO_HIDE_MS);
    };
    // Анимируем полоску внутри карточки: на следующий tick после render ставим width=0,
    // CSS transition её плавно «съедает» за AUTO_HIDE_MS.
    window.animateAutoHideBars = () => {
      document.querySelectorAll('.auto-hide-bar[data-pending="1"]').forEach((el) => {
        el.dataset.pending = '0';
        // requestAnimationFrame даёт браузеру отрисовать width=100% перед сменой на 0%
        requestAnimationFrame(() => requestAnimationFrame(() => { el.style.width = '0%'; }));
      });
    };
    window.applyTaskEvent = (ev) => {
      if (ev.snapshot) {
        window.tasksState = {};
        ev.snapshot.forEach(t => window.tasksState[t.id] = t);
        // на свежем снапшоте — для уже завершённых тоже взведём авто-скрытие
        ev.snapshot.forEach(t => window.scheduleAutoHide(t.id, t.status));
      } else if (ev.id) {
        const prev = window.tasksState[ev.id];
        if (prev && prev.status !== ev.status && window.hiddenTasks) {
          window.hiddenTasks.delete(ev.id);
        }
        window.tasksState[ev.id] = ev;
        if (prev && prev.status === 'running' && ev.status === 'done') {
          window.showToast('ok', `✓ ${ev.label}: ${ev.message || 'готово'}`);
          window.maybeRefreshTable(ev.kind);
        } else if (prev && prev.status === 'running' && ev.status === 'error') {
          window.showToast('err', `✗ ${ev.label}: ${ev.error || ev.message}`);
        } else if (prev && prev.status === 'running' && ev.status === 'cancelled') {
          window.showToast('info', `⏵ ${ev.label} отменено`);
        }
        window.scheduleAutoHide(ev.id, ev.status);
      }
      window.renderTasks();
    };

    // === Init ===
    // SSE: client + scheduler (заменяет polling /api/status)
    if (typeof EventSource !== 'undefined') {
      const esStatus = new EventSource('/api/status/stream');
      esStatus.onmessage = (e) => {
        try {
          const d = JSON.parse(e.data);
          window.renderClient(d.client);
          window.renderScheduler(d.scheduler);
          document.getElementById('status-panel').style.display = 'flex';
        } catch(_) {}
      };
      esStatus.onerror = () => { /* let browser reconnect */ };
    } else {
      // Фоллбэк для древних браузеров
      fetch('/api/status').then(r => r.json()).then(d => {
        window.renderClient(d.client);
        window.renderScheduler(d.scheduler);
        document.getElementById('status-panel').style.display = 'flex';
      });
    }

    // SSE tasks
    if (typeof EventSource !== 'undefined') {
      const es = new EventSource('/api/tasks/stream');
      es.onmessage = (e) => { try { window.applyTaskEvent(JSON.parse(e.data)); } catch(_) {} };
      es.onerror = () => { /* let browser reconnect */ };
    }

    // === Подсветка строки, на которую возвращаешься после клика по внешней ссылке ===
    // Плюс throttled-инкремент откликов: если ходишь между внешними вкладками,
    // фоновый sync_personal_refresh подтянет новые отклики и UI сам перерисуется.
    const SEEN_KEY = 'seen_external_rows';
    const SEEN_TTL_MS = 30 * 60 * 1000;
    const ACTIVITY_WINDOW_MS = 5 * 60 * 1000;
    const PERSONAL_REFRESH_THROTTLE_MS = 60 * 1000;
    window.lastExternalClickAt = 0;
    window.lastPersonalSyncAt = 0;
    const readSeen = () => {
      try { return JSON.parse(localStorage.getItem(SEEN_KEY) || '{}'); } catch(_) { return {}; }
    };
    const writeSeen = (m) => { try { localStorage.setItem(SEEN_KEY, JSON.stringify(m)); } catch(_) {} };
    document.addEventListener('click', (e) => {
      const a = e.target.closest && e.target.closest('a[target="_blank"]');
      if (!a) return;
      const tr = a.closest('tr[id^="row-"]');
      if (!tr) return;
      const id = tr.id.slice(4);
      const nameA = tr.querySelector('td a[target="_blank"]');
      const name = nameA ? nameA.textContent.trim() : '';
      const m = readSeen();
      m[id] = { ts: Date.now(), name };
      writeSeen(m);
      window.lastExternalClickAt = Date.now();
    }, true);
    window.applySeenHighlight = () => {
      const m = readSeen();
      const now = Date.now();
      const keep = {};
      let changed = false;
      Object.entries(m).forEach(([id, rec]) => {
        // обратная совместимость со старым форматом (timestamp вместо объекта)
        const ts = typeof rec === 'number' ? rec : (rec && rec.ts) || 0;
        const name = typeof rec === 'object' && rec ? rec.name : '';
        if (now - ts > SEEN_TTL_MS) { changed = true; return; }
        const row = document.getElementById('row-' + id);
        if (row) {
          row.classList.add('seen-external', 'seen-external-shake');
          setTimeout(() => row.classList.remove('seen-external-shake'), 500);
          changed = true;
        } else if (window.lastTableSwapAt && ts < window.lastTableSwapAt && name) {
          // строка не найдена после рефреша таблицы → отклик подтянулся и фильтр её скрыл
          window.showToast('ok', `✓ ${name} — отклик подтянут`);
          changed = true;
        } else {
          keep[id] = rec;
        }
      });
      if (changed) writeSeen(keep);
    };
    window.maybeRefreshNegotiations = () => {
      const now = Date.now();
      if (now - window.lastExternalClickAt > ACTIVITY_WINDOW_MS) return;
      if (now - window.lastPersonalSyncAt < PERSONAL_REFRESH_THROTTLE_MS) return;
      window.lastPersonalSyncAt = now;
      fetch('/api/scheduler/personal_refresh/run-now', {method: 'POST'}).catch(()=>{});
    };
    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        window.applySeenHighlight();
        window.maybeRefreshNegotiations();
      }
    });
    window.addEventListener('pageshow', () => window.applySeenHighlight());
    document.body.addEventListener('htmx:afterSwap', (e) => {
      if (e.target && e.target.id === 'table-body') {
        window.lastTableSwapAt = Date.now();
        window.applySeenHighlight();
      }
    });
  </script>
  <script>
    window.toggleTheme = () => {
      const cur = document.documentElement.classList.contains('dark');
      if (cur) { document.documentElement.classList.remove('dark'); localStorage.setItem('theme','light'); }
      else { document.documentElement.classList.add('dark'); localStorage.setItem('theme','dark'); }
    };

    // Универсальная клиентская сортировка таблиц по клику на <th>.
    // Использование: <th data-type="text|number" onclick="window.sortHtmlTable(this)">...
    // Цикл: asc → desc → none (восстановление исходного порядка).
    window.sortHtmlTable = (th) => {
      const table = th.closest('table');
      const tbody = table.tBodies[0];
      if (!tbody) return;
      const headers = Array.from(th.parentElement.children);
      const colIdx = headers.indexOf(th);
      const type = th.dataset.type || 'text';
      const cur = th.dataset.sortState || 'none';
      const next = cur === 'none' ? 'asc' : (cur === 'asc' ? 'desc' : 'none');
      // сбросим стрелки на других колонках
      headers.forEach(h => { if (h !== th) { h.dataset.sortState = ''; h.dataset.arrow = ''; } });
      th.dataset.sortState = next;
      th.dataset.arrow = next === 'asc' ? ' ↑' : (next === 'desc' ? ' ↓' : '');
      // обновим визуальный индикатор
      headers.forEach(h => {
        const baseText = (h.dataset.baseText !== undefined) ? h.dataset.baseText : h.textContent.replace(/[ ↑↓]+$/, '');
        h.dataset.baseText = baseText;
        h.textContent = baseText + (h.dataset.arrow || '');
      });
      // сохраним исходный порядок при первом клике
      if (!tbody.dataset.origOrder) {
        Array.from(tbody.rows).forEach((r, i) => r.dataset.origIdx = i);
        tbody.dataset.origOrder = '1';
      }
      const rows = Array.from(tbody.rows);
      if (next === 'none') {
        rows.sort((a, b) => Number(a.dataset.origIdx) - Number(b.dataset.origIdx));
      } else {
        const sign = next === 'asc' ? 1 : -1;
        rows.sort((a, b) => {
          const av = (a.cells[colIdx]?.textContent || '').trim();
          const bv = (b.cells[colIdx]?.textContent || '').trim();
          let cmp;
          if (type === 'number') {
            const an = parseFloat(av.replace(/[^\d.-]/g, '')) || 0;
            const bn = parseFloat(bv.replace(/[^\d.-]/g, '')) || 0;
            cmp = an - bn;
          } else {
            cmp = av.localeCompare(bv, 'ru');
          }
          return cmp * sign;
        });
      }
      rows.forEach(r => tbody.appendChild(r));
    };

    // Стоп running-прогона джоба со страницы /jobs.
    window.stopJobRun = async (runId) => {
      if (!confirm('Остановить этот прогон джоба?')) return;
      window.showToast('info', `⏹ останавливаю прогон #${runId}…`);
      try {
        const r = await fetch(`/api/jobs/${runId}/stop`, {method: 'POST'});
        const d = await r.json();
        if (d.ok) {
          const msg = d.action === 'marked_interrupted'
            ? `⏹ прогон #${runId} был зависшим — помечен прерванным`
            : `⏹ прогон #${runId} остановлен`;
          window.showToast('ok', msg);
          setTimeout(() => location.reload(), 800);
        } else if (d.reason === 'not_running') {
          window.showToast('err', `прогон #${runId} уже не выполняется (нечего останавливать)`);
        } else {
          window.showToast('err', `не удалось остановить #${runId}`);
        }
      } catch(e) {
        window.showToast('err', `ошибка: ${e.message}`);
      }
    };
  </script>
</body>
